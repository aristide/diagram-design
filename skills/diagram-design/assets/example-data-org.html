<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Data organisation · 5-tier storage pattern</title>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --color-paper:  #f5f5f5;
      --color-ink:    #2d3142;
      --color-muted:  #4f5d75;
      --color-accent: #eb6c36;
      --font-sans:    'Geist', system-ui, sans-serif;
      --font-serif:   'Instrument Serif', serif;
      --font-mono:    'Geist Mono', ui-monospace, monospace;
    }
    body {
      font-family: var(--font-sans);
      background: var(--color-paper);
      color: var(--color-ink);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 2rem;
    }
    .frame { max-width: 1200px; width: 100%; }
    .eyebrow {
      font-family: var(--font-mono);
      font-size: 0.66rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-muted);
      margin-bottom: 0.5rem;
    }
    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 2.4vw + 0.75rem, 2rem);
      font-weight: 400;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin-bottom: 1.5rem;
    }
    svg { width: 100%; min-width: 960px; display: block; }
  </style>
</head>
<body>
  <div class="frame">
    <p class="eyebrow">Architecture · Diagram Design</p>
    <h1>Data organisation · 5-tier storage pattern</h1>

    <svg viewBox="0 0 1000 488" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
          <circle cx="1" cy="1" r="0.9" fill="rgba(45,49,66,0.10)"/>
        </pattern>
        <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#4f5d75"/>
        </marker>
        <marker id="arrow-accent" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
          <polygon points="0 0, 8 3, 0 6" fill="#eb6c36"/>
        </marker>
      </defs>

      <!-- Background -->
      <rect width="100%" height="100%" fill="#f5f5f5"/>
      <rect width="100%" height="100%" fill="url(#dots)" opacity="0.55"/>

      <!-- ═══════════════════════════════════════════
           ARROWS — drawn before zones (z-order rule)
           ═══════════════════════════════════════════ -->
      <line x1="185" y1="230" x2="194" y2="230" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="371" y1="230" x2="380" y2="230" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>
      <line x1="557" y1="230" x2="566" y2="230" stroke="#eb6c36" stroke-width="1.2" marker-end="url(#arrow-accent)"/>
      <line x1="743" y1="230" x2="752" y2="230" stroke="#4f5d75" stroke-width="1" marker-end="url(#arrow)"/>

      <!-- ═══════════════════════════════════════════
           ZONE RECTS (5 tier cards)
           ═══════════════════════════════════════════ -->
      <!-- RAW -->
      <rect x="8"   y="20" width="176" height="408" rx="10" fill="rgba(220,50,100,0.06)"   stroke="rgba(220,50,100,0.28)"   stroke-width="1"/>
      <!-- BRONZE -->
      <rect x="194" y="20" width="176" height="408" rx="10" fill="rgba(139,90,43,0.07)"    stroke="rgba(139,90,43,0.28)"    stroke-width="1"/>
      <!-- SILVER -->
      <rect x="380" y="20" width="176" height="408" rx="10" fill="rgba(20,155,150,0.06)"   stroke="rgba(20,155,150,0.28)"   stroke-width="1"/>
      <!-- GOLD (FOCAL) -->
      <rect x="566" y="20" width="176" height="408" rx="10" fill="rgba(235,108,54,0.08)"   stroke="#eb6c36"                 stroke-width="1.2"/>
      <!-- ARCHIVE -->
      <rect x="752" y="20" width="176" height="408" rx="10" fill="rgba(100,100,110,0.04)"  stroke="rgba(100,100,110,0.22)"  stroke-width="1"/>

      <!-- ═══════════════════════════════════════════
           RAW ZONE (x=8, center_x=96)
           ═══════════════════════════════════════════ -->
      <text x="96" y="52" fill="#c73860" font-size="20" font-style="italic" font-family="'Instrument Serif', serif" text-anchor="middle">RAW</text>
      <line x1="18" y1="78" x2="174" y2="78" stroke="rgba(220,50,100,0.20)" stroke-width="0.8"/>

      <text x="96" y="94"  fill="#2d3142" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Original files</text>
      <text x="96" y="107" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">as received</text>

      <text x="96" y="127" fill="#4f5d75" font-size="7.5" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">Formats:</text>
      <text x="96" y="140" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">Excel, CSV, TXT,</text>
      <text x="96" y="152" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">JSON, XML</text>

      <text x="96" y="172" fill="#4f5d75" font-size="7.5" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">Examples:</text>
      <text x="96" y="185" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">ministry-trade-</text>
      <text x="96" y="197" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">2026Q1.xlsx</text>
      <text x="96" y="209" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">cpi-march-2026.csv</text>

      <line x1="18" y1="389" x2="174" y2="389" stroke="rgba(220,50,100,0.15)" stroke-width="0.8"/>
      <text x="96" y="403" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Access:</text>
      <text x="96" y="416" fill="#c73860" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">Data Engineers only</text>

      <!-- ═══════════════════════════════════════════
           BRONZE ZONE (x=194, center_x=282)
           ═══════════════════════════════════════════ -->
      <text x="282" y="52" fill="#7a6240" font-size="20" font-style="italic" font-family="'Instrument Serif', serif" text-anchor="middle">Anonymized</text>
      <text x="282" y="68" fill="rgba(122,98,64,0.70)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">(BRONZE)</text>
      <line x1="204" y1="78" x2="360" y2="78" stroke="rgba(139,90,43,0.20)" stroke-width="0.8"/>

      <text x="282" y="94"  fill="#2d3142" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Converted to</text>
      <text x="282" y="107" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Parquet format</text>

      <text x="282" y="127" fill="#2d3142" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">PII removed /</text>
      <text x="282" y="140" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">pseudonymized</text>

      <text x="282" y="160" fill="#4f5d75" font-size="7.5" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">Examples:</text>
      <text x="282" y="173" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">trade-2026Q1.parquet</text>
      <text x="282" y="185" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">(anonymized)</text>

      <line x1="204" y1="389" x2="360" y2="389" stroke="rgba(139,90,43,0.15)" stroke-width="0.8"/>
      <text x="282" y="403" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Access:</text>
      <text x="282" y="416" fill="#7a6240" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">Engineers + Stewards</text>

      <!-- ═══════════════════════════════════════════
           SILVER ZONE (x=380, center_x=468)
           ═══════════════════════════════════════════ -->
      <text x="468" y="52" fill="#0e8a85" font-size="20" font-style="italic" font-family="'Instrument Serif', serif" text-anchor="middle">Staging</text>
      <text x="468" y="68" fill="rgba(14,138,133,0.70)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">(SILVER)</text>
      <line x1="390" y1="78" x2="546" y2="78" stroke="rgba(20,155,150,0.20)" stroke-width="0.8"/>

      <text x="468" y="94"  fill="#2d3142" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Cleaned &amp;</text>
      <text x="468" y="107" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">validated</text>

      <text x="468" y="127" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Standardized schemas</text>
      <text x="468" y="147" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Linked via unique IDs</text>

      <text x="468" y="167" fill="#4f5d75" font-size="7.5" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">Examples:</text>
      <text x="468" y="180" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">trade_cleaned_</text>
      <text x="468" y="192" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">2026Q1.parquet</text>

      <line x1="390" y1="389" x2="546" y2="389" stroke="rgba(20,155,150,0.15)" stroke-width="0.8"/>
      <text x="468" y="403" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Access:</text>
      <text x="468" y="416" fill="#0e8a85" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">All authenticated users</text>

      <!-- ═══════════════════════════════════════════
           GOLD ZONE — FOCAL (x=566, center_x=654)
           ═══════════════════════════════════════════ -->
      <text x="654" y="52" fill="#eb6c36" font-size="20" font-style="italic" font-family="'Instrument Serif', serif" text-anchor="middle">Aggregated</text>
      <text x="654" y="68" fill="rgba(235,108,54,0.70)" font-size="8" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.12em">(GOLD)</text>
      <line x1="576" y1="78" x2="732" y2="78" stroke="rgba(235,108,54,0.25)" stroke-width="0.8"/>

      <text x="654" y="94"  fill="#eb6c36" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Publication-ready</text>
      <text x="654" y="107" fill="#eb6c36" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">statistics</text>

      <text x="654" y="127" fill="#2d3142" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">CPI, GDP,</text>
      <text x="654" y="140" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Trade reports</text>

      <text x="654" y="160" fill="#4f5d75" font-size="7.5" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">Examples:</text>
      <text x="654" y="173" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">trade_quarterly_</text>
      <text x="654" y="185" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">aggregate.parquet</text>
      <text x="654" y="197" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">cpi_2026_03.parquet</text>

      <line x1="576" y1="389" x2="732" y2="389" stroke="rgba(235,108,54,0.25)" stroke-width="0.8"/>
      <text x="654" y="403" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Access:</text>
      <text x="654" y="416" fill="#eb6c36" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">All (read-only)</text>

      <!-- ═══════════════════════════════════════════
           ARCHIVE ZONE (x=752, center_x=840)
           ═══════════════════════════════════════════ -->
      <text x="840" y="52" fill="#7a8399" font-size="12" font-weight="600" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.18em">ARCHIVE</text>
      <line x1="762" y1="78" x2="908" y2="78" stroke="rgba(100,100,110,0.18)" stroke-width="0.8"/>

      <text x="840" y="94"  fill="#2d3142" font-size="9" font-weight="600" font-family="'Geist', sans-serif" text-anchor="middle">Historical snapshots</text>
      <text x="840" y="114" fill="#2d3142" font-size="9" font-family="'Geist', sans-serif" text-anchor="middle">Long-term retention</text>

      <text x="840" y="134" fill="#4f5d75" font-size="7.5" font-weight="500" font-family="'Geist Mono', monospace" text-anchor="middle">Examples:</text>
      <text x="840" y="147" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">trade_2025_</text>
      <text x="840" y="159" fill="#7a8399" font-size="7.5" font-family="'Geist Mono', monospace" text-anchor="middle">annual.parquet</text>

      <line x1="762" y1="389" x2="908" y2="389" stroke="rgba(100,100,110,0.15)" stroke-width="0.8"/>
      <text x="840" y="403" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle" letter-spacing="0.08em">Access:</text>
      <text x="840" y="416" fill="#7a8399" font-size="7" font-family="'Geist Mono', monospace" text-anchor="middle">Admins only</text>

      <!-- ═══════════════════════════════════════════
           LEGEND
           ═══════════════════════════════════════════ -->
      <line x1="40" y1="436" x2="960" y2="436" stroke="rgba(45,49,66,0.10)" stroke-width="0.8"/>
      <text x="40" y="452" fill="#4f5d75" font-size="8" font-family="'Geist Mono', monospace" letter-spacing="0.18em">LEGEND</text>

      <rect x="104" y="460" width="18" height="10" rx="3" fill="rgba(220,50,100,0.10)"  stroke="rgba(220,50,100,0.35)"  stroke-width="1"/>
      <text x="130" y="470" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Raw</text>

      <rect x="180" y="460" width="18" height="10" rx="3" fill="rgba(139,90,43,0.10)"   stroke="rgba(139,90,43,0.35)"   stroke-width="1"/>
      <text x="206" y="470" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Anonymized (Bronze)</text>

      <rect x="368" y="460" width="18" height="10" rx="3" fill="rgba(20,155,150,0.10)"  stroke="rgba(20,155,150,0.35)"  stroke-width="1"/>
      <text x="394" y="470" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Staging (Silver)</text>

      <rect x="528" y="460" width="18" height="10" rx="3" fill="rgba(235,108,54,0.10)"  stroke="#eb6c36"                stroke-width="1.2"/>
      <text x="554" y="470" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Aggregated (Gold · focal)</text>

      <rect x="748" y="460" width="18" height="10" rx="3" fill="rgba(100,100,110,0.08)" stroke="rgba(100,100,110,0.30)" stroke-width="1"/>
      <text x="774" y="470" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Archive</text>

      <line x1="850" y1="462" x2="870" y2="462" stroke="#eb6c36" stroke-width="1.2"/>
      <text x="878" y="468" fill="#4f5d75" font-size="8.5" font-family="'Geist', sans-serif">Tier upgrade</text>
    </svg>
  </div>
</body>
</html>
